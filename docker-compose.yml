services:
  watchtower:
    build: .
    container_name: watchtower
    ports:
      - "67:67"
    volumes:
      - scan-data:/app/data
      - reports:/app/reports
      - dc-data:/opt/dependency-check/data
      - ${LOCAL_PROJECTS_PATH:-/tmp/projects}:/projects:ro
    environment:
      - DATABASE_URL=sqlite:///app/data/watchtower.db?mode=rwc
      - ZAP_URL=http://zap:8080
      - LEPTOS_SITE_ADDR=0.0.0.0:67
    depends_on:
      - zap
      - sonarqube
    networks:
      - watchtower-net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: watchtower-zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=changeme
    ports:
      - "8081:8080"
    networks:
      - watchtower-net

  sonarqube:
    image: sonarqube:community
    container_name: watchtower-sonarqube
    ports:
      - "9091:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - watchtower-net

networks:
  watchtower-net:
    driver: bridge

volumes:
  scan-data:
  reports:
  dc-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
